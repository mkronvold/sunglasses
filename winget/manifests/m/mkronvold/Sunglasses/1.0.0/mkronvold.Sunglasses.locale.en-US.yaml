ShortDescription: Fullscreen click-through screen dimmer overlay for Windows, controlled by global hotkeys.
Description: >-
  Sunglasses places a full-screen, click-through black overlay on top of
  everything to dim your display. Transparency is controlled with global
  hotkeys (Right Alt + Mouse Wheel), the current level is shown briefly
  on-screen, and the app lives in the system tray with optional auto-start.
